<!DOCTYPE html>
<html>
    {% load static %}
    <head>
        <meta charset="utf-8"/>
        <title>CCP - Connexion</title>
        <link rel="icon" href="/static//img/logoPanda.png"/>
        <link rel="stylesheet" type="text/css" href="/static/css/style.css"/>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <form style="display:none;">
            {% csrf_token %}
        </form>
        <div id="body">
            <h1 class="titre">La Crèche Conviviale Parfaite</h1>

            <header>
            <!-- Bannière + liens -->
                <nav id="banner">
                    <a v-for="link in filteredLinks" 
                        :href="link.url" 
                        :key="link.name"
                        @click="link.action === 'logout' ? logout($event) : null"
                        :class="{ loginLink: link.isLogin }">
                        [[ link.name ]]
                    </a>
                    <a href="https://github.com/Triiiss/CrecheConvivialeParfaite" target="_blank">Git</a>
                    <a href="https://miro.com/welcomeonboard/V1hhcXp3VnczdG5lNTJJdGlwaHlpT0tVWit3TWFhZmhOVFE5Mmg1ZllQcHZSNUJvVThQWmh6WVFIZDVwWE5GY0I5YzRob296ZExlTGVib294UXFjR3RzNVJRaW52VlozZUZLc1JhNWpIakJhWldjNHd0R0FZUXRNd1FBNHNhU01nbHpza3F6REdEcmNpNEFOMmJXWXBBPT0hdjE=?share_link_id=631888282038" target="_blank">Le plan</a>
                    <a href="https://www.youtube.com/watch?v=ThJwLNaeckM" target="_blank">Équipe</a>
                    <a href="https://fr.china-embassy.gov.cn/fra/" target="_blank">Contact</a>
                </nav>
            </header>

            <h2>Connexion</h2>

            <form id="connexion" method="POST">
                {% csrf_token %}
                <fieldset>
                    <legend>Connexion</legend>

                    <label for="username">Identifiant :</label>
                    <input type="text" name="username" required>
                
                    <br>

                    <label for="password">Mot de passe :</label>
                    <input type="password" name="password" required>

                    <br>

                    <button type="submit" class="inscription" name="submit">Se connecter</button>

                    <p>Vous n'avez pas encore de compte ? <a href="/inscription/">Inscrivez-vous</a></p>

                </fieldset>
            </form>


            <div id="footer" >
                <span>Nous contacter :</span>
                <p>Email : contact@cpp.com<br/>Téléphone : 01 23 45 67 89</p>
                <br/>
            </div>
        </div>

        <script>
            const { createApp, ref, computed } = Vue

            function getCSRFToken() {
                return document.cookie
                    .split("; ")
                    .find(row => row.startsWith("csrftoken"))
                    ?.split("=")[1]
            }

            createApp({
                delimiters: ['[[', ']]'],
                setup() {
                    const links = ref([
                        { name: "Accueil", url: "/", slug:"", auth: null},
                        { name: "Recherche", url: "/recherche/", slug:"recherche", auth: null },
                        { name: "Profil", url: "/profil/", slug:"profil", auth: true},
                        { name: "Connexion", url: "/connexion/", isLogin: true, slug:"connexion", auth: false },
                        { name: "Inscription", url: "/inscription/", isLogin: true, slug:"inscription", auth: false },
                        { name: "Déconnexion", action: "logout", isLogin: true,auth: true }
                    ])

                    const currentPage = window.location.pathname.replaceAll("/", "")

                    const logout = () => {
                        fetch("/logout/", {
                            method: "POST",
                            credentials: "include",
                            headers: {
                                "X-CSRFToken": getCSRFToken()
                            }
                        })
                        .then(() => {
                            isAuthenticated.value = false
                            window.location.href = "/"
                        })
                    }

                    const isAuthenticated = ref(false)

                    fetch("/api/auth/")
                        .then(res => res.json())
                        .then(data => {
                            isAuthenticated.value = data.isAuthenticated
                        })
                        
                    
                    const filteredLinks = computed(() => {
                        return links.value.filter(link => {
                            if (link.slug === currentPage) return false
                            if (link.auth === true && !isAuthenticated.value) return false
                            if (link.auth === false && isAuthenticated.value) return false

                            return true
                        })
                    })
                    return { filteredLinks, logout }
                }
            }).mount("#banner")
        </script>
        
    </body>
</html>
